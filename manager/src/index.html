<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMP聊天翻译</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
    <script>
      if (!window.managerApi) {
        console.log("Mocking managerApi for browser preview...");
        const mockUpdateProxies = [
          "github.chenc.dev",
          "ghproxy.cfd",
          "github.tbedu.top",
          "ghproxy.cc",
          "gh.monlor.com",
          "cdn.akaere.online",
          "gh.idayer.com",
          "gh.llkk.cc",
          "ghpxy.hwinzniej.top",
          "github-proxy.memory-echoes.cn",
          "git.yylx.win",
          "gitproxy.mrhjx.cn",
          "gh.fhjhy.top",
          "gp.zkitefly.eu.org",
          "gh-proxy.com",
          "ghfile.geekertao.top",
          "j.1lin.dpdns.org",
          "ghproxy.imciel.com",
          "github-proxy.teach-english.tech",
          "gh.927223.xyz",
          "github.ednovas.xyz",
          "ghf.xn--eqrr82bzpe.top",
          "gh.dpik.top",
          "gh.jasonzeng.dev",
          "gh.xxooo.cf",
          "gh.bugdey.us.kg",
          "ghm.078465.xyz",
          "j.1win.ggff.net",
          "tvv.tw",
          "gitproxy.127731.xyz",
          "gh.inkchills.cn",
          "ghproxy.cxkpro.top",
          "gh.sixyin.com",
          "github.geekery.cn",
          "git.669966.xyz",
          "gh.5050net.cn",
          "gh.felicity.ac.cn",
          "github.dpik.top",
          "ghp.keleyaa.com",
          "gh.wsmdn.dpdns.org",
          "ghproxy.monkeyray.net",
          "fastgit.cc",
          "gh.catmak.name",
          "gh.noki.icu"
        ].map((host) => ({ id: host, label: host, baseUrl: `https://${host}` })).concat([
          { id: "direct", label: "GitHub 直连", baseUrl: "" }
        ]);
        window.managerApi = {
          detectPath: async () => "D:\\SteamLibrary\\steamapps\\common\\Euro Truck Simulator 2",
          browsePath: async () => "D:\\SteamLibrary\\steamapps\\common\\Euro Truck Simulator 2",
          state: async () => ({ text: "已安装 (v0.3.5)", pluginDir: "D:\\SteamLibrary\\steamapps\\common\\Euro Truck Simulator 2\\bin\\win_x64\\plugins" }),
          installDll: async () => {},
          uninstallDll: async () => {},
          readConfig: async () => JSON.stringify({
            target_lang: "zh-CN",
            overlay_hotkey: "Ctrl+Shift+T",
            workers: 8,
            queue_limit: 1000,
            cache_limit: 1500,
            timeout_ms: 5000,
            font_size: 18,
            overlay_opacity: 98,
            providers: [
              {
                kind: "anthropic",
                label: "Anthropic",
                enabled: true,
                base_url: "https://api.anthropic.com/v1",
                api_key: "sk-ant-xxxxxxxxxxxxxxxxxxxxxxxxxx",
                api_secret: "",
                model: "claude-3-5-haiku-latest",
                source: "auto",
                target: "zh-CN"
              }
            ]
          }, null, 2),
          writeConfig: async () => {},
          testConfig: async () => ({ ok: true, summary: "所有测试均已通过", results: [{ label: "Anthropic", kind: "anthropic", ok: true, status: 200, elapsed_ms: 245 }] }),
          listPresets: async () => [
            { name: "DeepSeek 官方", config: { target_lang: "zh-CN", overlay_hotkey: "Ctrl+Shift+T", workers: 4, queue_limit: 500, cache_limit: 1000, timeout_ms: 4000, font_size: 18, overlay_opacity: 95, providers: [{ kind: "deepseek", label: "DeepSeek", enabled: true, base_url: "https://api.deepseek.com", api_key: "sk-xxxxxxxx", model: "deepseek-v4-flash", source: "auto", target: "zh-CN" }] } },
            { name: "百度翻译 个人", config: { target_lang: "zh-CN", overlay_hotkey: "Ctrl+Shift+T", workers: 8, queue_limit: 1000, cache_limit: 1500, timeout_ms: 5000, font_size: 16, overlay_opacity: 90, providers: [{ kind: "baidu", label: "百度翻译", enabled: true, base_url: "https://fanyi-api.baidu.com", api_key: "appid", api_secret: "secret", model: "", source: "auto", target: "zh-CN" }] } }
          ],
          savePreset: async () => {},
          deletePreset: async () => {},
          getUpdateOptions: async () => ({
            version: "0.3.5",
            proxies: mockUpdateProxies,
            settings: {
              proxyMode: "auto",
              customProxyUrl: "",
              proxyId: "ghproxy.cc",
              lastFastProxyId: "ghproxy.cc"
            }
          }),
          saveUpdateSettings: async (settings) => settings,
          speedTestUpdateProxies: async () => {
            const results = mockUpdateProxies.map((proxy, index) => ({
              id: proxy.id,
              label: proxy.label,
              elapsedMs: index < 28 ? 180 + index * 37 : 3500,
              status: index < 28 ? 302 : 0,
              ok: index < 28,
              error: index < 28 ? "" : "超时"
            })).sort((a, b) => {
              if (a.ok !== b.ok) return a.ok ? -1 : 1;
              return a.elapsedMs - b.elapsedMs;
            });
            return {
              fastest: results.find((item) => item.ok),
              results
            };
          },
          checkUpdate: async () => ({
            currentVersion: "0.3.5",
            latestVersion: "0.3.6",
            hasUpdate: true,
            proxyLabel: "ghproxy.cc",
            elapsedMs: 340,
            asset: {
              downloadUrl: "https://ghproxy.cc/https://github.com/xxxxx/releases/download/v0.3.6/setup.exe",
              name: "setup.exe",
              sizeText: "14.5 MB"
            },
            body: "### v0.3.6 更新日志\n\n- 优化翻译响应速度\n- 修复偶尔卡顿的 Bug\n- 增强了悬浮窗的稳定性\n- 增加了自定义翻译前缀的支持"
          }),
          downloadUpdate: async () => ({ bytesText: "14.5 MB", proxyLabel: "ghproxy.cc" })
        };
      }
    </script>
  </head>
  <body>
    <div class="background-effects">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
      <div class="glow glow-3"></div>
    </div>
    
    <main class="shell">
      <header class="topbar glass-panel">
        <div class="header-content">
          <h1>TMP <span class="accent">聊天翻译</span></h1>
          <p>安装插件 DLL，管理翻译配置。</p>
        </div>
        <div id="statusPill" class="pill">准备就绪</div>
      </header>

      <section class="panel glass-panel install-panel">
        <div class="section-title">
          <div class="title-with-icon">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
              <h2>游戏路径与安装</h2>
          </div>
          <span id="installState" class="status-badge">正在检查...</span>
        </div>
        <div class="install-layout">
          <div class="install-game">
            <div class="game-switch">
              <button type="button" class="game-tab active" data-game="ets2">ETS2</button>
              <button type="button" class="game-tab" data-game="ats">ATS</button>
            </div>
          </div>
          <div class="install-main">
            <div class="path-row">
              <label id="gamePathLabel" for="ets2Path">ETS2 安装目录</label>
              <div class="input-group">
                <input id="ets2Path" type="text" spellcheck="false" placeholder="等待识别..." />
                <div class="btn-group">
                  <button id="detectBtn" class="secondary-btn">自动识别</button>
                  <button id="browseBtn" class="secondary-btn">浏览</button>
                </div>
              </div>
            </div>
            <div id="pluginDir" class="hint"></div>
          </div>
          <div class="actions main-actions">
            <button id="installBtn" class="primary-btn pulse-hover">安装 / 更新 DLL</button>
            <button id="uninstallBtn" class="danger-btn">卸载 DLL</button>
          </div>
        </div>
      </section>

      <section class="panel glass-panel update-panel">
        <div class="section-title">
          <div class="title-with-icon">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"></path><polyline points="21 3 21 9 15 9"></polyline><path d="M12 7v5l3 2"></path></svg>
            <h2>软件更新</h2>
          </div>
          <span id="updateState" class="status-badge">当前版本：--</span>
        </div>
        <div class="update-layout">
          <div class="mirror-panel">
            <div class="mirror-head">
              <div>
                <h3>镜像选择</h3>
                <span>当前：<b id="currentMirror">自动测速选择</b></span>
              </div>
              <button id="speedTestBtn" class="secondary-btn" type="button">测速</button>
            </div>
            <div class="mirror-editor">
              <input id="mirrorUrl" spellcheck="false" placeholder="https://ghproxy.cc/" />
              <button id="saveMirrorBtn" class="secondary-btn" type="button">保存</button>
              <button id="clearMirrorBtn" class="secondary-btn" type="button">清除</button>
            </div>
            <div id="mirrorList" class="mirror-list" aria-live="polite"></div>
          </div>
          <div class="update-info">
            <div class="update-actions">
              <button id="checkUpdateBtn" class="secondary-btn" type="button">检查更新</button>
              <button id="downloadUpdateBtn" class="primary-btn" type="button" disabled>下载并安装</button>
            </div>
            <div id="updateSummary" class="update-summary">尚未检查更新</div>
            <div id="updateProgress" class="update-progress" hidden>
              <div class="progress-bar"><span id="updateProgressBar"></span></div>
              <div id="updateProgressText" class="test-meta">等待下载...</div>
            </div>
          </div>
          <div class="release-notes">
            <div class="release-title">更新日志</div>
            <div id="releaseNotes" class="release-body">检查更新后会显示 GitHub Release 内容。</div>
          </div>
        </div>
      </section>

      <section class="workspace-grid">
        <div class="config-stack">
          <div class="panel glass-panel form-section">
          <div class="section-title">
            <div class="title-with-icon">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
              <h2>翻译配置</h2>
            </div>
            <span class="sub-text">Provider 按配置顺序回退</span>
          </div>

          <div class="preset-toolbar">
            <div class="form-group">
              <label>配置预设</label>
              <div class="select-wrapper">
                <select id="configPreset">
                  <option value="">选择预设...</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>预设名称</label>
              <input id="presetName" spellcheck="false" placeholder="例如：DeepSeek / 百度 / 免费兜底" />
            </div>
            <div class="preset-actions">
              <button id="applyPresetBtn" class="secondary-btn" type="button">应用</button>
              <button id="savePresetBtn" class="secondary-btn" type="button">保存为预设</button>
              <button id="deletePresetBtn" class="danger-btn" type="button">删除</button>
            </div>
          </div>

          <div class="form-grid basic-grid">
            <div class="form-group">
              <label>主翻译平台</label>
              <div class="select-wrapper">
                <select id="preset">
                  <option value="anthropic">Anthropic 协议</option>
                  <option value="openai">OpenAI 协议</option>
                  <option value="deepseek">DeepSeek</option>
                  <option value="deepl">DeepL</option>
                  <option value="google-cloud">Google Cloud Translate</option>
                  <option value="microsoft">Microsoft Translator</option>
                  <option value="baidu">百度翻译</option>
                  <option value="youdao">有道智云</option>
                  <option value="tencent">腾讯云机器翻译</option>
                  <option value="aliyun">阿里云机器翻译</option>
                  <option value="volcengine">火山翻译</option>
                  <option value="libretranslate">LibreTranslate</option>
                  <option value="free">仅免费兜底</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>目标语言</label>
              <input id="targetLang" value="zh-CN" />
            </div>

            <div class="form-group">
              <label>Workers</label>
              <input id="workers" type="number" min="1" max="32" value="8" />
            </div>

            <div class="form-group">
              <label>队列上限</label>
              <input id="queueLimit" type="number" min="50" value="1000" />
            </div>

            <div class="form-group">
              <label>缓存上限</label>
              <input id="cacheLimit" type="number" min="100" value="1500" />
            </div>

            <div class="form-group">
              <label>超时 (ms)</label>
              <input id="timeoutMs" type="number" min="1500" max="6000" value="5000" />
            </div>
          </div>
          </div>

          <div class="panel glass-panel tuning-panel">
          <div class="form-grid tuning-grid">
            <div class="form-group">
              <label>悬浮窗字体大小</label>
              <div class="font-size-control">
                <button type="button" id="fontSizeMinus" class="size-btn" title="减小">−</button>
                <div class="size-display">
                  <span id="fontSizeValue">18</span>
                  <span class="size-unit">px</span>
                </div>
                <button type="button" id="fontSizePlus" class="size-btn" title="增大">+</button>
                <input id="fontSize" type="hidden" value="18" />
              </div>
              <div class="size-presets">
                <button type="button" class="preset-btn" data-size="14">小 14</button>
                <button type="button" class="preset-btn" data-size="18">中 18</button>
                <button type="button" class="preset-btn" data-size="22">大 22</button>
                <button type="button" class="preset-btn" data-size="26">特大 26</button>
              </div>
              <div class="font-preview" id="fontPreview">
                <div>中文：TruckersMP 翻译</div>
                <div>English: truckersmp chat preview</div>
              </div>
            </div>

            <div class="form-group">
              <label>悬浮窗透明度</label>
              <div class="range-control">
                <input id="overlayOpacity" type="range" min="35" max="100" value="98" />
                <div class="range-value"><span id="overlayOpacityValue">98</span>%</div>
              </div>
            </div>

            <div class="form-group">
              <label>悬浮窗快捷键</label>
              <input id="overlayHotkey" value="Ctrl+Shift+T" spellcheck="false" />
            </div>
          </div>
          </div>

          <div id="llmFields" class="panel glass-panel llm-fields provider-panel">
            <h3 class="inset-title">Provider 配置</h3>
            <div class="form-group">
              <label>Provider 名称</label>
              <input id="providerLabel" value="Anthropic" spellcheck="false" />
            </div>
            <div class="form-group">
              <label>base_url</label>
              <input id="baseUrl" value="https://api.anthropic.com/v1" spellcheck="false" />
            </div>
            <div class="form-group">
              <label>API Key / App ID</label>
              <input id="apiKey" type="password" spellcheck="false" placeholder="必填" />
            </div>
            <div class="form-group">
              <label>API Secret</label>
              <input id="apiSecret" type="password" spellcheck="false" placeholder="签名平台需要" />
            </div>
            <div class="form-group">
              <label>模型</label>
              <input id="model" value="claude-3-5-haiku-latest" spellcheck="false" />
            </div>
            <div class="form-group">
              <label>源语言</label>
              <input id="sourceLang" value="auto" spellcheck="false" />
            </div>
            <div class="form-group">
              <label>兜底接口</label>
              <div class="check-row">
                <input id="enableFallbacks" type="checkbox" checked />
                <span>启用 MyMemory / Andeer 回退</span>
              </div>
            </div>
          </div>

          <div class="panel glass-panel action-panel">
          <div class="actions split">
            <button id="loadConfigBtn" class="secondary-btn">读取已安装</button>
            <button id="previewBtn" class="secondary-btn">刷新预览</button>
            <button id="testConfigBtn" class="secondary-btn">测试配置</button>
            <button id="saveConfigBtn" class="primary-btn glow-btn">保存配置</button>
          </div>
          <div id="testResult" class="test-result" aria-live="polite"></div>
          </div>
        </div>

        <div class="panel glass-panel preview-panel">
          <div class="section-title">
            <div class="title-with-icon">
              <div class="mac-dots">
                <span class="mac-dot dot-red"></span>
                <span class="mac-dot dot-yellow"></span>
                <span class="mac-dot dot-green"></span>
              </div>
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              <h2>配置预览</h2>
            </div>
            <span class="sub-text filename">config.json</span>
          </div>
          <div class="editor-container">
            <button id="copyPreviewBtn" class="copy-badge-btn" type="button" title="复制到剪贴板">
              <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <span>复制</span>
            </button>
            <textarea id="preview" spellcheck="false"></textarea>
          </div>
        </div>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
